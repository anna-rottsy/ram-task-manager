<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAM Task Manager</title>
  <link rel="stylesheet" href="src/style.css">
</head>

<body>

  <div class="container">

    <h1>RAM Task Manager</h1>
